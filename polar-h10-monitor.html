<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polar H10 Monitor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f3; color: #1a1a1a; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: #fff; border-radius: 16px; padding: 2rem;
    width: 480px; box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
  .header span { font-size: 17px; font-weight: 600; }
  #connect-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 20px; font-size: 14px; font-weight: 500;
    border: 1px solid #ddd; border-radius: 10px;
    background: #fff; color: #1a1a1a; cursor: pointer;
    transition: background 0.15s;
  }
  #connect-btn:hover { background: #f5f5f3; }
  #connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #status { font-size: 13px; color: #888; margin-top: 8px; min-height: 20px; }
  #hr-display { display: none; margin-top: 1.5rem; }
  .bpm-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 0.5rem; }
  #bpm-value { font-size: 80px; font-weight: 600; line-height: 1; color: #1a1a1a; }
  #bpm-unit { font-size: 20px; color: #888; }
  .zone-badge {
    display: inline-block; padding: 4px 12px; border-radius: 8px;
    font-size: 12px; font-weight: 600; margin-bottom: 1.25rem;
  }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
  .stat-card { background: #f5f5f3; border-radius: 10px; padding: 12px; text-align: center; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .stat-value { font-size: 20px; font-weight: 600; }
  #chart-wrap { position: relative; height: 110px; }
  canvas { width: 100% !important; height: 110px !important; }
  #disconnect-btn {
    margin-top: 1rem; font-size: 13px; color: #aaa;
    background: none; border: none; cursor: pointer; text-decoration: underline;
  }
  .heart-icon { display: inline-block; font-size: 20px; }
  .beat { animation: beat 0.15s ease-out; }
  @keyframes beat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }
  svg.bt { width:16px; height:16px; vertical-align:-2px; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <span class="heart-icon" id="heart-icon">🫀</span>
    <span>Polar H10 Monitor</span>
  </div>

  <button id="connect-btn" onclick="connectBLE()">
    <svg class="bt" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6.5 6.5 17.5 17.5 12 23 12 1 17.5 6.5 6.5 17.5"/>
    </svg>
    Connect to Polar H10
  </button>
  <div id="status">Ready — make sure Chrome Bluetooth is enabled</div>

  <div id="hr-display">
    <div class="bpm-row">
      <span id="bpm-value">--</span>
      <span id="bpm-unit">BPM</span>
    </div>
    <div><span class="zone-badge" id="zone-badge">–</span></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Min</div><div class="stat-value" id="min-hr">--</div></div>
      <div class="stat-card"><div class="stat-label">Max</div><div class="stat-value" id="max-hr">--</div></div>
      <div class="stat-card"><div class="stat-label">Avg</div><div class="stat-value" id="avg-hr">--</div></div>
    </div>
    <div id="chart-wrap"><canvas id="chart"></canvas></div>
    <button id="disconnect-btn" onclick="disconnectBLE()">Disconnect</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
let device = null, char = null, chart = null;
const hrHistory = [], maxPoints = 60;
let minHR = Infinity, maxHR = -Infinity, sumHR = 0, countHR = 0;

function getZone(bpm) {
  if (bpm < 60)  return { label: 'Resting',  bg: '#dbeafe', color: '#1e40af' };
  if (bpm < 100) return { label: 'Light',    bg: '#dcfce7', color: '#166534' };
  if (bpm < 140) return { label: 'Moderate', bg: '#fef9c3', color: '#854d0e' };
  if (bpm < 170) return { label: 'Hard',     bg: '#ffedd5', color: '#9a3412' };
  return              { label: 'Max',      bg: '#fee2e2', color: '#991b1b' };
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

function initChart() {
  const ctx = document.getElementById('chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{ data: [], borderColor: '#E24B4A', borderWidth: 2, fill: true,
        backgroundColor: 'rgba(226,75,74,0.08)', tension: 0.4, pointRadius: 0 }]
    },
    options: {
      animation: false, responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        x: { display: false },
        y: { display: true, ticks: { color: '#aaa', font: { size: 11 }, maxTicksLimit: 4 },
          grid: { color: 'rgba(0,0,0,0.05)' } }
      }
    }
  });
}

function onHRData(event) {
  const view = event.target.value;
  const flags = view.getUint8(0);
  const bpm = (flags & 0x1) ? view.getUint16(1, true) : view.getUint8(1);

  document.getElementById('bpm-value').textContent = bpm;
  const icon = document.getElementById('heart-icon');
  icon.classList.remove('beat');
  void icon.offsetWidth;
  icon.classList.add('beat');

  const zone = getZone(bpm);
  const badge = document.getElementById('zone-badge');
  badge.textContent = zone.label;
  badge.style.background = zone.bg;
  badge.style.color = zone.color;

  minHR = Math.min(minHR, bpm); maxHR = Math.max(maxHR, bpm);
  sumHR += bpm; countHR++;
  document.getElementById('min-hr').textContent = minHR;
  document.getElementById('max-hr').textContent = maxHR;
  document.getElementById('avg-hr').textContent = Math.round(sumHR / countHR);

  hrHistory.push(bpm);
  if (hrHistory.length > maxPoints) hrHistory.shift();
  chart.data.labels = hrHistory.map((_, i) => i);
  chart.data.datasets[0].data = hrHistory;
  chart.options.scales.y.min = Math.max(30, Math.min(...hrHistory) - 10);
  chart.options.scales.y.max = Math.max(...hrHistory) + 10;
  chart.update('none');
}

async function connectBLE() {
  if (!navigator.bluetooth) {
    setStatus('Web Bluetooth not available — open this file in Chrome on macOS.');
    return;
  }
  const btn = document.getElementById('connect-btn');
  btn.disabled = true; setStatus('Searching for device…');
  try {
    device = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: 'Polar' }],
      optionalServices: ['heart_rate']
    });
    setStatus('Connecting…');
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService('heart_rate');
    char = await service.getCharacteristic('heart_rate_measurement');
    await char.startNotifications();
    char.addEventListener('characteristicvaluechanged', onHRData);
    device.addEventListener('gattserverdisconnected', onDisconnected);
    setStatus('Connected to ' + (device.name || 'Polar H10'));
    btn.style.display = 'none';
    document.getElementById('hr-display').style.display = 'block';
    initChart();
  } catch (e) {
    btn.disabled = false;
    setStatus(e.name === 'NotFoundError' ? 'No device selected.' : 'Error: ' + e.message);
  }
}

function onDisconnected() {
  setStatus('Disconnected.');
  document.getElementById('connect-btn').style.display = 'flex';
  document.getElementById('connect-btn').disabled = false;
  document.getElementById('hr-display').style.display = 'none';
}

async function disconnectBLE() {
  if (char) { try { await char.stopNotifications(); } catch(_){} }
  if (device && device.gatt.connected) device.gatt.disconnect();
}
</script>
</body>
</html>
