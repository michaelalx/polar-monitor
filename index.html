<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polar H10 Monitor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f0ee; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem;
}
h1 { font-size: 18px; font-weight: 600; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px; }
#add-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 18px; font-size: 14px; font-weight: 500;
  border: 1px solid #ccc; border-radius: 10px;
  background: #fff; color: #1a1a1a; cursor: pointer; margin-bottom: 1.5rem;
  transition: background 0.15s;
}
#add-btn:hover { background: #f5f5f3; }
#add-btn:disabled { opacity: 0.45; cursor: not-allowed; }
#devices-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.device-card {
  background: #fff; border-radius: 16px; padding: 1.25rem;
  border: 1px solid #e8e8e8; position: relative;
}
.device-card.connecting { opacity: 0.7; }
.card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
.avatar {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; flex-shrink: 0;
}
.name-input {
  font-size: 15px; font-weight: 600; border: none; outline: none;
  background: transparent; width: 100%; color: #1a1a1a;
}
.name-input::placeholder { color: #bbb; font-weight: 400; }
.dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  margin-left: auto;
}
.dot.green { background: #22c55e; }
.dot.gray  { background: #d1d5db; }
.dot.pulse { animation: pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

.bpm-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
.bpm-val { font-size: 60px; font-weight: 700; line-height: 1; }
.bpm-unit { font-size: 16px; color: #888; }
.zone-pill {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; margin-bottom: 12px;
}
.stats-row { display: flex; gap: 8px; margin-bottom: 12px; }
.stat { flex: 1; background: #f5f5f3; border-radius: 8px; padding: 8px 10px; text-align: center; }
.stat-lbl { font-size: 11px; color: #888; }
.stat-val { font-size: 16px; font-weight: 600; }
.chart-wrap { height: 70px; position: relative; }
canvas { width: 100% !important; height: 70px !important; }
.remove-btn {
  position: absolute; top: 12px; right: 12px;
  background: none; border: none; cursor: pointer; color: #ccc; font-size: 18px; line-height: 1;
  padding: 2px 6px; border-radius: 6px;
}
.remove-btn:hover { background: #f5f5f3; color: #888; }
.status-text { font-size: 12px; color: #aaa; margin-top: 8px; }
.heart { display: inline-block; }
.beat { animation: hb 0.18s ease-out; }
@keyframes hb { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }

.empty-state { color: #aaa; font-size: 14px; padding: 1rem 0; }

.name-row { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
</style>
</head>
<body>

<h1><span>🫀</span> Polar H10 Group Monitor</h1>
<button id="add-btn" onclick="addDevice()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  Add athlete
</button>

<div id="devices-grid">
  <p class="empty-state">No devices yet — click "Add athlete" to connect a Polar H10.</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const COLORS = [
  { bg:'#ede9fe', text:'#5b21b6', dot:'#7c3aed', chart:'#7c3aed' },
  { bg:'#d1fae5', text:'#065f46', dot:'#059669', chart:'#059669' },
  { bg:'#fee2e2', text:'#991b1b', dot:'#dc2626', chart:'#dc2626' },
  { bg:'#fef3c7', text:'#92400e', dot:'#d97706', chart:'#d97706' },
  { bg:'#dbeafe', text:'#1e40af', dot:'#2563eb', chart:'#2563eb' },
  { bg:'#fce7f3', text:'#9d174d', dot:'#db2777', chart:'#db2777' },
];

let colorIdx = 0;
const devices = {};
let idCounter = 0;

function getZone(bpm) {
  if (bpm < 60)  return { label:'Resting',  bg:'#dbeafe', color:'#1e40af' };
  if (bpm < 100) return { label:'Light',    bg:'#d1fae5', color:'#065f46' };
  if (bpm < 140) return { label:'Moderate', bg:'#fef9c3', color:'#854d0e' };
  if (bpm < 170) return { label:'Hard',     bg:'#ffedd5', color:'#9a3412' };
  return              { label:'Max',      bg:'#fee2e2', color:'#991b1b' };
}

function removeEmptyState() {
  const e = document.querySelector('.empty-state');
  if (e) e.remove();
}

function addDevice() {
  if (!navigator.bluetooth) {
    alert('Web Bluetooth is not available. Open this page in Chrome on macOS.');
    return;
  }
  const id = ++idCounter;
  const color = COLORS[colorIdx % COLORS.length];
  colorIdx++;

  removeEmptyState();

  const card = document.createElement('div');
  card.className = 'device-card connecting';
  card.id = 'card-' + id;
  card.innerHTML = `
    <button class="remove-btn" onclick="removeDevice(${id})" title="Remove">×</button>
    <div class="card-header">
      <div class="avatar" style="background:${color.bg};color:${color.text};" id="avatar-${id}">?</div>
      <div class="name-row">
        <input class="name-input" id="name-${id}" placeholder="Athlete name" maxlength="20"
          oninput="updateAvatar(${id})" />
      </div>
      <div class="dot gray pulse" id="dot-${id}"></div>
    </div>
    <div id="status-${id}" class="status-text">Connecting…</div>
  `;
  document.getElementById('devices-grid').appendChild(card);

  const btn = document.getElementById('add-btn');
  btn.disabled = true;

  navigator.bluetooth.requestDevice({
    filters: [{ namePrefix: 'Polar' }],
    optionalServices: ['heart_rate']
  }).then(device => {
    devices[id] = {
      device, char: null, chart: null,
      history: [], min: Infinity, max: -Infinity, sum: 0, count: 0,
      color
    };
    document.getElementById('status-' + id).textContent = 'Connecting to ' + device.name + '…';
    return device.gatt.connect();
  }).then(server => server.getPrimaryService('heart_rate'))
    .then(svc => svc.getCharacteristic('heart_rate_measurement'))
    .then(char => {
      devices[id].char = char;
      char.addEventListener('characteristicvaluechanged', e => onHR(id, e));
      devices[id].device.addEventListener('gattserverdisconnected', () => onDisconnect(id));
      return char.startNotifications();
    }).then(() => {
      const d = devices[id];
      const card = document.getElementById('card-' + id);
      card.classList.remove('connecting');
      document.getElementById('dot-' + id).className = 'dot green';
      document.getElementById('status-' + id).remove();

      card.querySelector('.card-header').insertAdjacentHTML('afterend', `
        <div class="bpm-row">
          <span class="bpm-val" id="bpm-${id}" style="color:${d.color.dot}">--</span>
          <span class="bpm-unit">BPM <span class="heart" id="heart-${id}">🫀</span></span>
        </div>
        <div><span class="zone-pill" id="zone-${id}">–</span></div>
        <div class="stats-row">
          <div class="stat"><div class="stat-lbl">Min</div><div class="stat-val" id="min-${id}">--</div></div>
          <div class="stat"><div class="stat-lbl">Max</div><div class="stat-val" id="max-${id}">--</div></div>
          <div class="stat"><div class="stat-lbl">Avg</div><div class="stat-val" id="avg-${id}">--</div></div>
        </div>
        <div class="chart-wrap"><canvas id="chart-${id}"></canvas></div>
      `);

      const ctx = document.getElementById('chart-' + id).getContext('2d');
      d.chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ data: [], borderColor: d.color.chart,
          borderWidth: 2, fill: true,
          backgroundColor: d.color.chart + '18', tension: 0.4, pointRadius: 0 }] },
        options: {
          animation: false, responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { enabled: false } },
          scales: {
            x: { display: false },
            y: { display: false }
          }
        }
      });
      btn.disabled = false;
    }).catch(err => {
      if (err.name !== 'NotFoundError') {
        document.getElementById('status-' + id).textContent = 'Error: ' + err.message;
      } else {
        removeDevice(id);
      }
      btn.disabled = false;
      if (devices[id] && !devices[id].char) delete devices[id];
      const grid = document.getElementById('devices-grid');
      if (!grid.querySelector('.device-card')) {
        grid.innerHTML = '<p class="empty-state">No devices yet — click "Add athlete" to connect a Polar H10.</p>';
      }
    });
}

function updateAvatar(id) {
  const name = document.getElementById('name-' + id).value.trim();
  const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2) || '?';
  document.getElementById('avatar-' + id).textContent = initials;
}

function onHR(id, event) {
  const d = devices[id];
  if (!d) return;
  const view = event.target.value;
  const flags = view.getUint8(0);
  const bpm = (flags & 0x1) ? view.getUint16(1, true) : view.getUint8(1);

  const bpmEl = document.getElementById('bpm-' + id);
  if (bpmEl) bpmEl.textContent = bpm;

  const heart = document.getElementById('heart-' + id);
  if (heart) { heart.classList.remove('beat'); void heart.offsetWidth; heart.classList.add('beat'); }

  const zone = getZone(bpm);
  const zoneEl = document.getElementById('zone-' + id);
  if (zoneEl) { zoneEl.textContent = zone.label; zoneEl.style.background = zone.bg; zoneEl.style.color = zone.color; }

  d.min = Math.min(d.min, bpm); d.max = Math.max(d.max, bpm);
  d.sum += bpm; d.count++;
  const minEl = document.getElementById('min-' + id);
  const maxEl = document.getElementById('max-' + id);
  const avgEl = document.getElementById('avg-' + id);
  if (minEl) minEl.textContent = d.min;
  if (maxEl) maxEl.textContent = d.max;
  if (avgEl) avgEl.textContent = Math.round(d.sum / d.count);

  d.history.push(bpm);
  if (d.history.length > 60) d.history.shift();
  if (d.chart) {
    d.chart.data.labels = d.history.map((_, i) => i);
    d.chart.data.datasets[0].data = d.history;
    d.chart.options.scales.y.min = Math.max(30, Math.min(...d.history) - 10);
    d.chart.options.scales.y.max = Math.max(...d.history) + 10;
    d.chart.update('none');
  }
}

function onDisconnect(id) {
  const dot = document.getElementById('dot-' + id);
  if (dot) { dot.className = 'dot gray'; }
  const card = document.getElementById('card-' + id);
  if (card) {
    const existing = card.querySelector('.status-text');
    if (!existing) {
      card.insertAdjacentHTML('beforeend', '<div class="status-text">Disconnected</div>');
    }
  }
}

function removeDevice(id) {
  const d = devices[id];
  if (d) {
    if (d.char) { try { d.char.stopNotifications(); } catch(_){} }
    if (d.device && d.device.gatt.connected) d.device.gatt.disconnect();
    if (d.chart) d.chart.destroy();
    delete devices[id];
  }
  const card = document.getElementById('card-' + id);
  if (card) card.remove();
  const grid = document.getElementById('devices-grid');
  if (!grid.querySelector('.device-card')) {
    grid.innerHTML = '<p class="empty-state">No devices yet — click "Add athlete" to connect a Polar H10.</p>';
  }
}
</script>
</body>
</html>
